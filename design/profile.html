<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCC — Profile concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(800px circle at 50% -10%,rgba(139,92,246,0.22),transparent 45%),radial-gradient(700px circle at 100% 30%,rgba(16,185,129,0.12),transparent 45%),#080b12;color:#e8edf5;min-height:100vh;padding:18px 16px 40px;-webkit-font-smoothing:antialiased}
  .num{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
  .glass{background:linear-gradient(160deg,rgba(255,255,255,0.07),rgba(255,255,255,0.025));border:1px solid rgba(255,255,255,0.09);border-radius:20px;backdrop-filter:blur(14px);box-shadow:0 10px 30px -12px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06)}
  .kicker{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8a94a6}
</style>
</head>
<body>

  <!-- Hero player card -->
  <div style="position:relative;border-radius:26px;overflow:hidden;margin-bottom:14px;background:linear-gradient(165deg,#1b1140,#0c1530 55%,#08130f);border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 50px -18px rgba(124,58,237,0.5)">
    <div style="position:absolute;inset:0;background:radial-gradient(400px circle at 80% 0%,rgba(139,92,246,0.35),transparent 55%),radial-gradient(360px circle at 0% 100%,rgba(16,185,129,0.22),transparent 55%);pointer-events:none"></div>
    <div style="position:absolute;top:14px;right:14px;text-align:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:7px 11px;backdrop-filter:blur(8px)">
      <div class="num" style="font-size:24px;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent">87</div>
      <div class="kicker" style="color:#fcd34d">OVR</div>
    </div>
    <div style="position:relative;padding:24px 20px 18px;display:flex;flex-direction:column;align-items:center;text-align:center">
      <div style="width:96px;height:96px;border-radius:28px;background:linear-gradient(135deg,#8b5cf6,#10b981);padding:3px;box-shadow:0 12px 30px -8px rgba(139,92,246,0.6)"><div style="width:100%;height:100%;border-radius:25px;background:#0c1019;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:34px">AS</div></div>
      <div class="num" style="font-size:26px;font-weight:800;margin-top:14px;background:linear-gradient(120deg,#fff,#a7f3d0);-webkit-background-clip:text;background-clip:text;color:transparent">Avinash Singh</div>
      <div style="display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;justify-content:center">
        <span style="font-size:10px;font-weight:700;padding:4px 11px;border-radius:999px;background:rgba(139,92,246,0.2);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3)">⚡ All-rounder</span>
        <span style="font-size:10px;font-weight:700;padding:4px 11px;border-radius:999px;background:rgba(255,255,255,0.08);color:#cbd5e1">#7 · Right-arm med</span>
      </div>
    </div>
  </div>

  <!-- Stat bento -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    <div class="glass" style="padding:14px 10px;text-align:center"><div class="num" style="font-size:24px;font-weight:800;color:#34d399">814</div><div class="kicker" style="margin-top:4px">Runs</div></div>
    <div class="glass" style="padding:14px 10px;text-align:center"><div class="num" style="font-size:24px;font-weight:800;color:#a78bfa">64</div><div class="kicker" style="margin-top:4px">Wickets</div></div>
    <div class="glass" style="padding:14px 10px;text-align:center"><div class="num" style="font-size:24px;font-weight:800;color:#fbbf24">12</div><div class="kicker" style="margin-top:4px">MOM</div></div>
  </div>

  <!-- Skill bars -->
  <div class="glass" style="padding:16px;margin-bottom:14px">
    <div class="kicker" style="margin-bottom:14px">Skill profile</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#cbd5e1">Batting</span><span class="num" style="color:#34d399;font-weight:700">78</span></div><div style="height:7px;border-radius:99px;background:rgba(255,255,255,0.07)"><div style="height:100%;width:78%;border-radius:99px;background:linear-gradient(90deg,#10b981,#34d399)"></div></div></div>
      <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#cbd5e1">Bowling</span><span class="num" style="color:#a78bfa;font-weight:700">85</span></div><div style="height:7px;border-radius:99px;background:rgba(255,255,255,0.07)"><div style="height:100%;width:85%;border-radius:99px;background:linear-gradient(90deg,#7c3aed,#a78bfa)"></div></div></div>
      <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#cbd5e1">Fielding</span><span class="num" style="color:#fbbf24;font-weight:700">71</span></div><div style="height:7px;border-radius:99px;background:rgba(255,255,255,0.07)"><div style="height:100%;width:71%;border-radius:99px;background:linear-gradient(90deg,#f59e0b,#fbbf24)"></div></div></div>
    </div>
  </div>

  <!-- Form + badges -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="glass" style="padding:15px">
      <div class="kicker" style="margin-bottom:11px">Recent form</div>
      <div style="display:flex;gap:5px">
        <span class="num" style="width:26px;height:26px;border-radius:8px;background:#10b981;color:#04140e;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center">W</span>
        <span class="num" style="width:26px;height:26px;border-radius:8px;background:#10b981;color:#04140e;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center">W</span>
        <span class="num" style="width:26px;height:26px;border-radius:8px;background:#ef4444;color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center">L</span>
        <span class="num" style="width:26px;height:26px;border-radius:8px;background:#10b981;color:#04140e;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center">W</span>
      </div>
    </div>
    <div class="glass" style="padding:15px">
      <div class="kicker" style="margin-bottom:11px">Badges · 9</div>
      <div style="font-size:21px;letter-spacing:3px">🏏💯🔥🚀👑</div>
    </div>
  </div>

</body>
</html>
